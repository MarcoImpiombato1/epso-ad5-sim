  question: "Which sign most strongly suggests an email might be a phishing attempt?"
  choices:
    A: "It uses your first name."
    B: "It contains a generic greeting and urges immediate action via a link."
    C: "It is sent during working hours."
    D: "It includes an attachment in PDF format."
    E: "It has a company logo."
  answer: "B"
  explanation: "Urgency + link + generic greeting are classic phishing indicators."
