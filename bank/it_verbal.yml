  question: "Tutti i documenti protocollati sono archiviati. Alcuni archiviati sono digitali. Quale affermazione è sicuramente vera?"
  choices:
    A: "Tutti i documenti digitali sono protocollati."
    B: "Alcuni documenti protocollati sono digitali."
    C: "Alcuni documenti archiviati potrebbero non essere protocollati."
    D: "Nessun documento protocollato è digitale."
    E: "Tutti i documenti archiviati sono protocollati."
  answer: "C"
  explanation: "Da 'tutti i protocollati sono archiviati' non segue che tutti gli archiviati siano protocollati: possono esistere archiviati non protocollati."
